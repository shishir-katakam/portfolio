<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shishir's Projects</title>
  <style>
    /* Apple Liquid Glass Minimalist Style */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }

    h1 {
      font-weight: 600;
      font-size: 2.5rem;
      margin-bottom: 50px;
      letter-spacing: 1px;
      z-index: 2;
      position: relative;
    }

    /* Project List */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 320px;
      z-index: 2;
      position: relative;
    }

    .project {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 25px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-decoration: none;
      color: #fff;
      font-size: 1.25rem;
      transition: 0.3s ease;
    }

    .project img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 8px;
    }

    .project:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    /* Animated Background (subtle monochrome particles) */
    .background {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      animation: float 20s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0.1; }
      50% { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(50px); opacity: 0.1; }
    }

    /* Responsive */
    @media (max-width: 400px) {
      .project-list {
        width: 90%;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 30px;
      }
      .project img {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>
  <h1>Shishir's Projects</h1>

  <div class="project-list">
    <a href="https://code.endiidishishir.qzz.io" class="project" target="_blank">
      <img src="./assets/codevacnce-logo.png" alt="Codevacnce Logo">
      Codevacnce
    </a>
    <a href="https://music.endiidishishir.qzz.io" class="project" target="_blank">
      <img src="./assets/niora-logo.png" alt="Niora Logo">
      Niora
    </a>
    <!-- Add future projects here -->
  </div>

  <!-- Animated Background -->
  <div class="background" id="background"></div>

  <script>
    // Create particles dynamically
    const background = document.getElementById('background');
    const particleCount = 30;

    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 4; // 4px to 10px
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = 10 + Math.random() * 20 + 's';
      background.appendChild(p);
    }
  </script>
</body>
</html>
