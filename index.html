<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Shishir Katakam's Projects</title>

        <!-- Open Graph / Telegram / WhatsApp Preview -->
          <meta property="og:title" content="Shishir Katakam's Projects" />
            <meta property="og:description" content="Minimal portfolio: Codevance, Niora, and more." />
              <meta property="og:image" content="https://endiidishishir.qzz.io/assets/niora-logo.png" />
                <meta property="og:url" content="https://endiidishishir.qzz.io" />
                  <meta name="twitter:card" content="summary_large_image" />

                    <style>
                        * {
                              margin: 0;
                                    padding: 0;
                                          box-sizing: border-box;
                                              }

                                                  body {
                                                        height: 100vh;
                                                              display: flex;
                                                                    flex-direction: column;
                                                                          justify-content: center;
                                                                                align-items: center;
                                                                                      background: #000;
                                                                                            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                                                                                                  overflow: hidden;
                                                                                                        color: #fff;
                                                                                                            }

                                                                                                                /* Glass effect card */
                                                                                                                    .glass {
                                                                                                                          background: rgba(255, 255, 255, 0.05);
                                                                                                                                border-radius: 20px;
                                                                                                                                      backdrop-filter: blur(15px);
                                                                                                                                            -webkit-backdrop-filter: blur(15px);
                                                                                                                                                  border: 1px solid rgba(255, 255, 255, 0.1);
                                                                                                                                                        padding: 2rem 3rem;
                                                                                                                                                              text-align: center;
                                                                                                                                                                    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
                                                                                                                                                                          position: relative;
                                                                                                                                                                                z-index: 10;
                                                                                                                                                                                    }

                                                                                                                                                                                        .title {
                                                                                                                                                                                              font-size: 2rem;
                                                                                                                                                                                                    margin-bottom: 2rem;
                                                                                                                                                                                                          font-weight: 600;
                                                                                                                                                                                                              }

                                                                                                                                                                                                                  .links {
                                                                                                                                                                                                                        display: flex;
                                                                                                                                                                                                                              flex-direction: column;
                                                                                                                                                                                                                                    gap: 1.5rem;
                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                            .link {
                                                                                                                                                                                                                                                  display: flex;
                                                                                                                                                                                                                                                        align-items: center;
                                                                                                                                                                                                                                                              gap: 1rem;
                                                                                                                                                                                                                                                                    font-size: 1.2rem;
                                                                                                                                                                                                                                                                          text-decoration: none;
                                                                                                                                                                                                                                                                                color: white;
                                                                                                                                                                                                                                                                                      transition: transform 0.2s ease;
                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                              .link:hover {
                                                                                                                                                                                                                                                                                                    transform: scale(1.05);
                                                                                                                                                                                                                                                                                                          color: #aaa;
                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                  .link img {
                                                                                                                                                                                                                                                                                                                        width: 28px;
                                                                                                                                                                                                                                                                                                                              height: 28px;
                                                                                                                                                                                                                                                                                                                                    border-radius: 6px;
                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                            /* Animated background blobs */
                                                                                                                                                                                                                                                                                                                                                .animation {
                                                                                                                                                                                                                                                                                                                                                      position: absolute;
                                                                                                                                                                                                                                                                                                                                                            width: 350px;
                                                                                                                                                                                                                                                                                                                                                                  height: 350px;
                                                                                                                                                                                                                                                                                                                                                                        border-radius: 50%;
                                                                                                                                                                                                                                                                                                                                                                              background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
                                                                                                                                                                                                                                                                                                                                                                                    filter: blur(80px);
                                                                                                                                                                                                                                                                                                                                                                                          animation: float 10s infinite alternate ease-in-out;
                                                                                                                                                                                                                                                                                                                                                                                                z-index: 1;
                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                        .animation:nth-child(1) {
                                                                                                                                                                                                                                                                                                                                                                                                              top: -120px;
                                                                                                                                                                                                                                                                                                                                                                                                                    left: -120px;
                                                                                                                                                                                                                                                                                                                                                                                                                          animation-delay: 0s;
                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                  .animation:nth-child(2) {
                                                                                                                                                                                                                                                                                                                                                                                                                                        bottom: -120px;
                                                                                                                                                                                                                                                                                                                                                                                                                                              right: -120px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    animation-delay: 4s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                            @keyframes float {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  0% { transform: translate(0,0) scale(1); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        100% { transform: translate(60px, 60px) scale(1.3); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- Background blobs -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="animation"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="animation"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <!-- Main card -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="glass">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h1 class="title">My Projects</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="links">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <a class="link" href="https://code.endiidishishir.qzz.io" target="_blank">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <img src="/assets/codevance-logo.png" alt="Codevance Logo"> Codevance
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <a class="link" href="https://music.endiidishishir.qzz.io" target="_blank">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <img src="/assets/niora-logo.png" alt="Niora Logo"> Niora
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </html>
