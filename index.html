<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>endiidishishir</title>
        <style>
            /* Reset */
                * {
                      margin: 0;
                            padding: 0;
                                  box-sizing: border-box;
                                      }

                                          body {
                                                height: 100vh;
                                                      display: flex;
                                                            flex-direction: column;
                                                                  justify-content: center;
                                                                        align-items: center;
                                                                              background: linear-gradient(135deg, #000000, #1a1a1a);
                                                                                    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                                                                                          overflow: hidden;
                                                                                                color: #fff;
                                                                                                    }

                                                                                                        /* Liquid glass card */
                                                                                                            .glass {
                                                                                                                  background: rgba(255, 255, 255, 0.05);
                                                                                                                        border-radius: 20px;
                                                                                                                              backdrop-filter: blur(15px);
                                                                                                                                    -webkit-backdrop-filter: blur(15px);
                                                                                                                                          border: 1px solid rgba(255, 255, 255, 0.1);
                                                                                                                                                padding: 2rem 3rem;
                                                                                                                                                      text-align: center;
                                                                                                                                                            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
                                                                                                                                                                  position: relative;
                                                                                                                                                                        z-index: 10;
                                                                                                                                                                            }

                                                                                                                                                                                .title {
                                                                                                                                                                                      font-size: 2rem;
                                                                                                                                                                                            margin-bottom: 2rem;
                                                                                                                                                                                                  font-weight: 600;
                                                                                                                                                                                                      }

                                                                                                                                                                                                          .links {
                                                                                                                                                                                                                display: flex;
                                                                                                                                                                                                                      flex-direction: column;
                                                                                                                                                                                                                            gap: 1.5rem;
                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                    .link {
                                                                                                                                                                                                                                          display: flex;
                                                                                                                                                                                                                                                align-items: center;
                                                                                                                                                                                                                                                      gap: 1rem;
                                                                                                                                                                                                                                                            font-size: 1.2rem;
                                                                                                                                                                                                                                                                  text-decoration: none;
                                                                                                                                                                                                                                                                        color: white;
                                                                                                                                                                                                                                                                              transition: transform 0.2s ease;
                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                      .link:hover {
                                                                                                                                                                                                                                                                                            transform: scale(1.05);
                                                                                                                                                                                                                                                                                                  color: #aaa;
                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                          .link img {
                                                                                                                                                                                                                                                                                                                width: 28px;
                                                                                                                                                                                                                                                                                                                      height: 28px;
                                                                                                                                                                                                                                                                                                                            border-radius: 6px;
                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                    /* Background animation */
                                                                                                                                                                                                                                                                                                                                        .animation {
                                                                                                                                                                                                                                                                                                                                              position: absolute;
                                                                                                                                                                                                                                                                                                                                                    width: 400px;
                                                                                                                                                                                                                                                                                                                                                          height: 400px;
                                                                                                                                                                                                                                                                                                                                                                border-radius: 50%;
                                                                                                                                                                                                                                                                                                                                                                      background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
                                                                                                                                                                                                                                                                                                                                                                            animation: float 10s infinite alternate;
                                                                                                                                                                                                                                                                                                                                                                                  z-index: 1;
                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                          .animation:nth-child(1) {
                                                                                                                                                                                                                                                                                                                                                                                                top: -100px;
                                                                                                                                                                                                                                                                                                                                                                                                      left: -100px;
                                                                                                                                                                                                                                                                                                                                                                                                            animation-delay: 0s;
                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                    .animation:nth-child(2) {
                                                                                                                                                                                                                                                                                                                                                                                                                          bottom: -120px;
                                                                                                                                                                                                                                                                                                                                                                                                                                right: -80px;
                                                                                                                                                                                                                                                                                                                                                                                                                                      animation-delay: 3s;
                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                              @keyframes float {
                                                                                                                                                                                                                                                                                                                                                                                                                                                    0% { transform: translate(0,0) scale(1); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                          100% { transform: translate(50px, 50px) scale(1.2); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <!-- Background blobs -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="animation"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="animation"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- Main glass card -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="glass">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h1 class="title">endiidishishir</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="links">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <a class="link" href="https://codevance.vercel.app" target="_blank">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <img src="./assets/codevance.png" alt="Codevance Logo"> Codevance
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <a class="link" href="https://niora.vercel.app" target="_blank">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <img src="./assets/niora.png" alt="Niora Logo"> Niora
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
